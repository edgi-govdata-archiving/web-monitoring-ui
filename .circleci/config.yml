version: 2.1

commands:
  build_ci_image:
    description: "Build the CI container image from the main Dockerfile's dev stage"
    steps:
      - run:
          name: Docker Login to dhi.io
          command: docker login dhi.io -u $DOCKER_USER -p $DOCKER_PASS
      - run:
          name: Build CI image
          command: docker build --target dev -t web-monitoring-ui-ci .
  setup_npm:
    description: "Set up NPM dependencies (inside CI image)"
    steps:
      - restore_cache:
          keys:
            - dependency-cache-2-{{ checksum "package-lock.json" }}
            - dependency-cache-2-
      - run:
          name: Dependencies
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm ci
      - save_cache:
          key: dependency-cache-2-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

jobs:
  build:
    machine:
      image: ubuntu-2004:202111-02
    steps:
      - checkout
      - build_ci_image
      - setup_npm
      - run:
          name: Build
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm run build-production
      - run:
          name: Check Bundle Size
          command: |
            docker run --rm \
              -v "$PWD":/app -w /app \
              -e CI -e CIRCLECI \
              -e CIRCLE_SHA1 -e CIRCLE_BRANCH \
              -e CIRCLE_REPOSITORY_URL -e CIRCLE_BUILD_NUM \
              -e BUNDLEWATCH_GITHUB_TOKEN \
              web-monitoring-ui-ci npm run bundlewatch

  test:
    machine:
      image: ubuntu-2004:202111-02
    steps:
      - checkout
      - build_ci_image
      - setup_npm
      - run:
          name: Lint Code
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm run lint
      - run:
          name: Test
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm test

  build_docker:
    machine:
      image: ubuntu-2004:202111-02
    steps:
      - checkout
      - run:
          name: Docker Login to dhi.io
          command: docker login dhi.io -u $DOCKER_USER -p $DOCKER_PASS
      - run:
          name: Build Image
          command: |
            docker build -t envirodgi/ui:$CIRCLE_SHA1 .
      - run:
          name: Save Image
          command: |
            mkdir /tmp/workspace
            docker save --output /tmp/workspace/docker-image envirodgi/ui:$CIRCLE_SHA1
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - docker-image

  publish_docker:
    machine:
      image: ubuntu-2004:202111-02
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Load Built Docker Image
          command: docker load --input /tmp/workspace/docker-image
      - run:
          name: Docker Login
          command: docker login -u $DOCKER_USER -p $DOCKER_PASS
      - run:
          name: Publish Images
          command: |
            docker image tag envirodgi/ui:${CIRCLE_SHA1} envirodgi/ui:latest
            docker push envirodgi/ui:${CIRCLE_SHA1}
            docker push envirodgi/ui:latest

workflows:
  build:
    jobs:
      - build:
          filters:
            branches:
              ignore: release
      - build_docker:
          filters:
            branches:
              ignore: release
      - test:
          filters:
            branches:
              ignore: release

  build-and-publish:
    jobs:
      - build:
          filters:
            branches:
              only:
                - release
      - build_docker:
          filters:
            branches:
              only:
                - release
      - publish_docker:
          requires:
            - build
            - build_docker
