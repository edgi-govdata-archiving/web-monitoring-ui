# CircleCI configuration for web-monitoring-ui: 
# build -> test -> Docker build -> publish
version: 2.1

commands:
  # Runs ci against the same image developers use locally, promoting consistency
  build_ci_image:
    description: "Build the CI container image from the main Dockerfile's dev stage"
    steps:
      # Authenticate to the hardened registry to pull the base image
      - run:
          name: Docker Login to dhi.io
          command: docker login dhi.io -u $DOCKER_USER -p $DOCKER_PASS
      # Build the CI image using the dev stage of the Dockerfile
      - run:
          name: Build CI image
          command: docker build --target dev -t web-monitoring-ui-ci .
  # For local dev this is done in the devcontainer config using the postCreateCommand hook/field
  # Since CI uses the image directly we install dependencies as a separate step here
  setup_npm:
    description: "Set up NPM dependencies (inside CI image)"
    steps:
      - run:
          name: Dependencies
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm ci

jobs:
  # Build the application and check bundle size to prevent regressions
  build:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - build_ci_image
      - setup_npm
      # Build the application using the CI image to ensure consistency with local development
      - run:
          name: Build
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm run build-production
      # Check bundle size to prevent regressions, using the CI image to ensure consistency with local development
      - run:
          name: Check Bundle Size
          command: |
            docker run --rm \
              -v "$PWD":/app -w /app \
              -e CI -e CIRCLECI \
              -e CIRCLE_SHA1 -e CIRCLE_BRANCH \
              -e CIRCLE_REPOSITORY_URL -e CIRCLE_BUILD_NUM \
              -e BUNDLEWATCH_GITHUB_TOKEN \
              web-monitoring-ui-ci npm run bundlewatch

  test:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - build_ci_image
      - setup_npm
      # Run lint and tests using the CI image to ensure consistency with local development
      - run:
          name: Lint Code
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm run lint
      - run:
          name: Test
          command: docker run --rm -v "$PWD":/app -w /app web-monitoring-ui-ci npm test

  # Build the Docker image for the application and save it to be used in the publish step
  build_docker:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      # Authenticate to the hardened registry to pull the base image
      - run:
          name: Docker Login to dhi.io
          command: docker login dhi.io -u $DOCKER_USER -p $DOCKER_PASS
      - run:
          name: Build Image
          command: |
            docker build -t envirodgi/ui:$CIRCLE_SHA1 .
      - run:
          name: Save Image
          command: |
            mkdir /tmp/workspace
            docker save --output /tmp/workspace/docker-image envirodgi/ui:$CIRCLE_SHA1
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - docker-image
  
  # Publish the built Docker image to Docker Hub, tagging with both the commit SHA and "latest"
  publish_docker:
    machine:
      image: ubuntu-2204:current
    steps:
      # Attach the workspace to access the saved Docker image from the previous step 
      - attach_workspace:
          at: /tmp/workspace
        # Load the saved Docker image from the previous step to avoid rebuilding it
      - run:
          name: Load Built Docker Image
          command: docker load --input /tmp/workspace/docker-image
      # Authenticate to Docker Hub to allow pushing the image
      - run:
          name: Docker Login
          command: docker login -u $DOCKER_USER -p $DOCKER_PASS
      # Tag and push the image to Docker Hub with both the commit SHA and "latest" tags
      - run:
          name: Publish Images
          command: |
            docker image tag envirodgi/ui:${CIRCLE_SHA1} envirodgi/ui:latest
            docker push envirodgi/ui:${CIRCLE_SHA1}
            docker push envirodgi/ui:latest

workflows:
  build:
    jobs:
      - build:
          filters:
            branches:
              ignore: release
      - test:
          filters:
            branches:
              ignore: release
      - build_docker:
          requires:
            - test
          filters:
            branches:
              ignore: release

  build-and-publish:
    jobs:
      - build:
          filters:
            branches:
              only:
                - release
      - test:
          filters:
            branches:
              only:
                - release
      - build_docker:
          requires:
            - test
          filters:
            branches:
              only:
                - release
      - publish_docker:
          requires:
            - build
            - test
            - build_docker
          filters:
            branches:
              only:
                - release
